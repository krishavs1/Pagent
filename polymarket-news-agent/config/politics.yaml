# Domain configuration for a "politics" deployment (placeholders).
# This file is meant to be edited frequently as you tune sources, priors, and filters.

domain:
  name: politics
  entity_types:
    - PERSON
    - ORG
    - COUNTRY
    - US_STATE
    - PARTY
    - BILL
    - AGENCY
    - ELECTION

news_sources:
  tier_1:
    - name: "NPR Politics"
      kind: rss
      url: "https://feeds.npr.org/1014/rss.xml"
    - name: "NYT Politics"
      kind: rss
      url: "https://rss.nytimes.com/services/xml/rss/nyt/Politics.xml"
  tier_2:
    - name: "Politico"
      kind: rss
      url: "https://rss.politico.com/congress.xml"
    - name: "PBS Politics"
      kind: rss
      url: "https://www.pbs.org/newshour/feeds/rss/politics"
  tier_3:
    - name: "political_x"
      type: "x_api"
      # X API v2 pay-per-use: $0.005/post read, deduped within 24hr UTC window
      # Uses Bearer Token auth (app-only, read public posts)
      accounts:
        - "kaborstv"
        - "jakesherman"
        - "mkraju"
        - "axios"
        - "PunchbowlNews"
        - "AP"
        - "Reuters"
      keywords:
        - "BREAKING"
        - "JUST IN"
        - "CONFIRMED"
        - "sources tell"
        - "expected to"
      poll_seconds: 60           # poll once per minute to control costs
      max_results_per_account: 5 # recent tweets per poll per account
  tier_4:
    - name: "BBC UK Politics"
      kind: rss
      url: "https://feeds.bbci.co.uk/news/politics/rss.xml"

official_sources:
  - name: "White House Presidential Actions"
    kind: official
    url: "https://www.whitehouse.gov/presidential-actions/feed/"
  - name: "Congress.gov"
    kind: official
    api: "congress"
    bill_updates: true

signal_priors:
  # Prior probability that a signal is "actionable" for edge, by signal type.
  OFFICIAL_OUTCOME: 0.80
  CREDIBLE_SCOOP: 0.55
  INSIDER_LEAK: 0.35
  POLL_SHIFT: 0.45
  PUNDIT_SPECULATION: 0.10

market_filters:
  include_tags:
    - "Politics"
    - "Elections"
    - "US"
  exclude_tags:
    - "Crypto"
    - "Sports"
  question_keywords_allowlist:
    - "election"
    - "nominee"
    - "primary"
    - "approval"
    - "senate"
    - "house"
    - "supreme court"
  min_volume_24h: 10_000
  min_liquidity: 2_000
